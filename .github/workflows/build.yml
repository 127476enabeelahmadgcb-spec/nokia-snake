name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip zip unzip openjdk-11-jdk libtool libtool-bin autoconf automake
          pip3 install buildozer cython kivy
      - name: Build APK
        run: |
          buildozer android debug
        env:
          BUILDOZER_WARN_ON_ROOT: "0"
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: nokia-snake-apk
          path: bin/*.apk
